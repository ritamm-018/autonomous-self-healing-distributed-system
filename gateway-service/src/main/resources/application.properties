# Spring Boot Application Configuration
# 
# WHAT IS THIS FILE?
# This file configures our Spring Boot application.
# It's like settings for our service - port number, URLs, timeouts, etc.
#
# WHY PROPERTIES FILE?
# Instead of hardcoding values in code, we put them here.
# This makes it easy to change settings without recompiling code.
# In production, you'd use environment variables or a config server.

# Server Configuration
# Port 8080 is the standard port for web services
# When you visit http://localhost:8080, you're connecting to this service
server.port=8080

# Application Name
# Used for service discovery and logging
spring.application.name=gateway-service

# Actuator Configuration
# Actuator provides health checks and metrics endpoints
# /health - tells us if the service is running
# /metrics - shows performance metrics
# /prometheus - exposes metrics in Prometheus format
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging Configuration
# Structured JSON logs are easier to parse and search
# In production, logs go to centralized systems like ELK, Splunk, etc.
logging.level.root=INFO
logging.level.com.selfhealing.gateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Service URLs
# These are the URLs of other services we need to communicate with
# In Docker, services can talk to each other using service names
# (e.g., "auth-service" instead of "localhost")
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
data.service.url=${DATA_SERVICE_URL:http://localhost:8082}

# Gateway Configuration
# Timeout settings - how long to wait for a response from backend services
# If a service takes longer than this, we consider it failed
gateway.timeout.connect=5000
gateway.timeout.read=10000

# Retry Configuration
# If a request fails, how many times should we retry?
gateway.retry.max-attempts=3
gateway.retry.delay=1000
