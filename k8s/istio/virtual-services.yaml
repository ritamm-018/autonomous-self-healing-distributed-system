---
# Notification Service VirtualService
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: notification-virtualservice
  namespace: self-healing-prod
spec:
  hosts:
  - "notification-service"
  http:
  - route:
    - destination:
