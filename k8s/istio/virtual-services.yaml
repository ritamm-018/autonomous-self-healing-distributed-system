---
# Gateway Service VirtualService
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gateway-virtualservice
  namespace: self-healing-prod
spec:
  hosts:
  - "selfhealing.example.com"
  - "gateway-service"
  gateways:
  - self-healing-gateway
  - mesh  # Also apply to internal mesh traffic
  http:
  - match:
    - uri:
        prefix: "/"
    route:
    - destination:
        host: gateway-service
        port:
          number: 8080
        subset: v1
      weight: 100
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure,refused-stream

---
# Auth Service VirtualService
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: auth-virtualservice
  namespace: self-healing-prod
spec:
  hosts:
  - "auth-service"
  http:
  - route:
    - destination:
        host: auth-service
        port:
          number: 8081
        subset: v1
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: 5xx,reset,connect-failure

---
# Data Service VirtualService
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: data-virtualservice
  namespace: self-healing-prod
spec:
  hosts:
  - "data-service"
  http:
  - route:
    - destination:
        host: data-service
        port:
          number: 8082
        subset: v1
    timeout: 15s
    retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: 5xx,reset,connect-failure

---
# Health Monitor VirtualService
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: health-monitor-virtualservice
  namespace: self-healing-prod
spec:
