  http:
  - route:
    - destination:
        host: health-monitor-service
        port:
          number: 8083
        subset: v1
    timeout: 10s

---
# Recovery Manager VirtualService
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: recovery-manager-virtualservice
  namespace: self-healing-prod
spec:
  hosts:
  - "recovery-manager-service"
  http:
  - route:
    - destination:
        host: recovery-manager-service
        port:
          number: 8084
        subset: v1
