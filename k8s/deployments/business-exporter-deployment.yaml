apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-metrics-exporter
  namespace: self-healing-monitoring
  labels:
    app: business-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: business-exporter
  template:
    metadata:
      labels:
        app: business-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      containers:
      - name: exporter
        image: business-metrics-exporter:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus-kube-prometheus-prometheus.self-healing-monitoring:9090"
        ports:
        - containerPort: 9100
---
apiVersion: v1
kind: Service
metadata:
  name: business-metrics-exporter
  namespace: self-healing-monitoring
  labels:
    app: business-exporter
spec:
  selector:
    app: business-exporter
  ports:
  - port: 9100
    targetPort: 9100
