---
# Decision Engine Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  namespace: self-healing-prod
  labels:
    app: decision-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-engine
  template:
    metadata:
      labels:
        app: decision-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8095"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: decision-engine
      containers:
      - name: decision-engine
        image: decision-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8095
          name: http
        env:
        - name: RULES_FILE
          value: "/app/rules.yaml"
        - name: RECOVERY_MANAGER_URL
          value: "http://recovery-manager-service:8080"
        - name: NOTIFICATION_URL
          value: "http://notification-service:8080"
        - name: PROMETHEUS_URL
          value: "http://prometheus-kube-prometheus-prometheus.self-healing-monitoring:9090"
        - name: ANOMALY_DETECTOR_URL
          value: "http://anomaly-detector-service:8090"
        - name: PORT
          value: "8095"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8095
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8095
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: models
          mountPath: /app/models
      volumes:
      - name: models
        emptyDir: {}

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: decision-engine-service
  namespace: self-healing-prod
  labels:
    app: decision-engine
spec:
  selector:
    app: decision-engine
  ports:
  - port: 8095
    targetPort: 8095
    protocol: TCP
    name: http
  type: ClusterIP

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: decision-engine
  namespace: self-healing-prod

---
# Role for reading pods and deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: decision-engine-role
  namespace: self-healing-prod
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: decision-engine-binding
  namespace: self-healing-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: decision-engine-role
subjects:
- kind: ServiceAccount
  name: decision-engine
  namespace: self-healing-prod

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: decision-engine-pdb
  namespace: self-healing-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: decision-engine

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: decision-engine-hpa
  namespace: self-healing-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: decision-engine
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
