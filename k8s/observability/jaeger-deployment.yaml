---
# Jaeger Operator (recommended for production)
# Or use all-in-one for development

# Jaeger All-in-One Deployment (Development)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: self-healing-monitoring
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.52
        ports:
        - name: query
          containerPort: 16686
        - name: collector-http
          containerPort: 14268
        - name: collector-grpc
          containerPort: 14250
        - name: agent-zipkin
          containerPort: 5775
          protocol: UDP
        - name: agent-compact
          containerPort: 6831
          protocol: UDP
        - name: agent-binary
          containerPort: 6832
          protocol: UDP
        - name: admin
          containerPort: 14269
        env:
        - name: COLLECTOR_ZIPKIN_HOST_PORT
          value: ":9411"
        - name: SPAN_STORAGE_TYPE
          value: "elasticsearch"
        - name: ES_SERVER_URLS
          value: "http://elasticsearch-client:9200"
        - name: ES_INDEX_PREFIX
          value: "jaeger"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /
            port: 14269
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 14269
          initialDelaySeconds: 30
          periodSeconds: 5

---
# Jaeger Query Service
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: self-healing-monitoring
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
  - name: query
    port: 16686
    targetPort: 16686
  selector:
    app: jaeger

---
# Jaeger Collector Service
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: self-healing-monitoring
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
  - name: collector-http
    port: 14268
    targetPort: 14268
  - name: collector-grpc
    port: 14250
    targetPort: 14250
  - name: zipkin
    port: 9411
    targetPort: 9411
  selector:
    app: jaeger

---
# Jaeger Agent Service (for sidecar injection)
apiVersion: v1
kind: Service
metadata:
  name: jaeger-agent
  namespace: self-healing-monitoring
  labels:
    app: jaeger
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: agent-zipkin-thrift
    port: 5775
    protocol: UDP
    targetPort: 5775
  - name: agent-compact
    port: 6831
    protocol: UDP
    targetPort: 6831
  - name: agent-binary
    port: 6832
    protocol: UDP
    targetPort: 6832
  selector:
    app: jaeger

---
# Jaeger Sampling Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-sampling-config
  namespace: self-healing-monitoring
data:
  sampling.json: |
    {
      "service_strategies": [
        {
          "service": "gateway-service",
          "type": "probabilistic",
          "param": 0.1
        },
        {
          "service": "auth-service",
          "type": "probabilistic",
          "param": 0.05
        },
        {
          "service": "data-service",
          "type": "probabilistic",
          "param": 0.1
        },
        {
          "service": "health-monitor-service",
          "type": "probabilistic",
          "param": 0.01
        },
        {
          "service": "recovery-manager-service",
          "type": "probabilistic",
          "param": 0.2
        },
        {
          "service": "logging-service",
          "type": "probabilistic",
          "param": 0.01
        },
        {
          "service": "notification-service",
          "type": "probabilistic",
          "param": 0.05
        },
        {
          "service": "anomaly-detector",
          "type": "probabilistic",
          "param": 0.1
        }
      ],
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.01
      }
    }
